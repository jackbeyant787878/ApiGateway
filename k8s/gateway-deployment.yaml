apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-deployment
  namespace: gateway
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: gateway-svc
  template:
    metadata:
      labels:
        app: gateway-svc
    spec:
      securityContext:
        fsGroup: 1654                 # 保证容器用户可读写共享卷
      imagePullSecrets:
      - name: tcr-secret
      containers:
      - name: gateway-api
        image: PLACEHOLDER_IMAGE      # 由 CI 替换
        imagePullPolicy: Always
        ports:
        - containerPort: 5040
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        envFrom:
        - configMapRef:
            name: gateway-config
        volumeMounts:
        - name: keys-volume
          mountPath: /app/keys        # 挂载共享 PVC，读取公钥
        livenessProbe:
          httpGet:
            path: /gateway/health
            port: 5040
          initialDelaySeconds: 15
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /gateway/health
            port: 5040
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: keys-volume
        persistentVolumeClaim:
          claimName: shared-keys-pvc   # 使用 gateway 命名空间下的共享 PVC

name: ApiGateway Build

on:
  push:
    branches: [ master ]
    paths:
      - 'src/ApiGateway/**'
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Restore dependencies
        run: dotnet restore src/ApiGateway/ApiGateway.csproj
      - name: Build solution
        run: dotnet build src/ApiGateway/ApiGateway.csproj --configuration Release --no-restore
      - name: Run unit tests (if any)
        run: dotnet test src/ApiGateway.Tests/ --no-restore --verbosity normal || true
